name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build release binaries
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          .\build.ps1 -Installer -GitHubRepo "clickrax/clickrax"

      - name: Create portable archive
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/clickrax.exe, build/bin/clickrax-cli.exe -DestinationPath build/bin/clickrax-windows-amd64-portable.zip -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/clickrax.exe
            build/bin/clickrax-cli.exe
            build/bin/clickrax-windows-amd64-portable.zip
            build/bin/*installer*.exe
          generate_release_notes: true
